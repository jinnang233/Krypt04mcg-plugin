name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress package

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find target -maxdepth 1 -type f -name "Krypt04McgRelay-*.jar" \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Generate snapshot tag
        id: snapshot
        shell: bash
        run: |
          echo "tag=snapshot-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "name=Snapshot $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Check OpenSSL version
        shell: bash
        run: |
          docker run --rm alpine/openssl version
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            release-artifacts/*.jar
      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.tag }}"
          RELEASE_NAME="${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.name }}"

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          {
            echo "# ${RELEASE_NAME}"
            echo
            echo "## Changelog"
            echo

            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since \`${PREVIOUS_TAG}\`:"
              echo
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:'- %s (%h)' || true
            else
              echo "No previous tag was found. Recent changes:"
              echo
              git log -20 --pretty=format:'- %s (%h)' || true
            fi

            echo
            echo
            echo "## Build Artifacts"
            echo

            shopt -s nullglob
            for file in release-artifacts/*.jar; do
              sha256="$(sha256sum "$file" | awk '{print $1}')"
              filename="$(basename "$file")"

              echo "### ${filename}"
              echo
              echo "- SHA256: \`${sha256}\`"
              echo "- VirusTotal: https://www.virustotal.com/gui/file/${sha256}"
              echo
            done

            echo "## Signature"
            echo
            echo "Each JAR file is signed with the detached \`.sign\` file."
            echo "The public key is included as \`public_key.pem\`."
          } > RELEASE_NOTE.md

          cat RELEASE_NOTE.md
      - name: Sign release artifacts
        shell: bash
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [ -z "${SIGN_PRIVATE_KEY:-}" ]; then
            echo "RELEASE_SIGN_KEY is not set; skipping artifact signing."
            exit 0
          fi

          trap 'rm -f private_key.pem; echo "Cleaned up private key."' EXIT
          umask 077
          printf '%s\n' "$SIGN_PRIVATE_KEY" > private_key.pem

          files=(release-artifacts/*.jar)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JAR files found to sign"
            exit 1
          fi

          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine/openssl pkey -pubout -in /work/private_key.pem -out /work/release-artifacts/public_key.pem

          for file in "${files[@]}"; do
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              alpine/openssl \
              dgst \
              -sign /work/private_key.pem \
              -out "/work/${file}.sign" \
              "/work/${file}"
          done

          rm -f private_key.pem
          ls -la release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.name }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTE.md
          files: release-artifacts/*

