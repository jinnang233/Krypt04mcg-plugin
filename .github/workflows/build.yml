name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Krypt04McgRelay
          path: target/Krypt04McgRelay-*.jar
          if-no-files-found: error
